<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D6 Кубики - Псевдо-3D Пилот</title>
    <style>
        :root {
            --dice-color: #ffffff;
            --pip-color: #000000;
            --bg-color: #f0f2f5;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: #333;
            text-align: center;
            padding: 40px 20px;
            margin: 0;
        }

        h1 { margin-bottom: 30px; color: #2c3e50; }

        .controls {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            align-items: center;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            margin-bottom: 40px;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 5px;
        }

        label {
            font-size: 0.9em;
            font-weight: 600;
            color: #555;
        }

        input[type="number"], input[type="color"] {
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
        }

        input[type="color"] {
            width: 50px;
            height: 38px;
            padding: 2px;
            cursor: pointer;
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1em;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
            align-self: flex-end;
        }

        button:hover { background-color: #2980b9; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }

        #dice-container {
            display: flex;
            flex-wrap: wrap;
            gap: 40px;
            justify-content: center;
            perspective: 1000px;
            min-height: 150px;
            margin-bottom: 30px;
        }

        .dice-wrapper {
            width: 70px;
            height: 70px;
            perspective: 600px;
        }

        .dice {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 1.5s cubic-bezier(0.2, 0.8, 0.3, 1);
        }

        .dice.rolling {
            animation: roll 0.4s linear infinite;
        }

        @keyframes roll {
            0% { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
            100% { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
        }

        .face {
            position: absolute;
            width: 70px;
            height: 70px;
            background: var(--dice-color);
            border: 2px solid rgba(0,0,0,0.1);
            border-radius: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(3, 1fr);
            padding: 10px;
            box-sizing: border-box;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.05);
        }

        .pip {
            width: 12px;
            height: 12px;
            background: var(--pip-color);
            border-radius: 50%;
            align-self: center;
            justify-self: center;
            display: none;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.3);
        }

        /* 3D Transformations for Faces */
        .face-1 { transform: rotateY(0deg) translateZ(35px); }
        .face-2 { transform: rotateY(180deg) translateZ(35px); }
        .face-3 { transform: rotateY(-90deg) translateZ(35px); }
        .face-4 { transform: rotateY(90deg) translateZ(35px); }
        .face-5 { transform: rotateX(90deg) translateZ(35px); }
        .face-6 { transform: rotateX(-90deg) translateZ(35px); }

        /* Pip Layouts */
        .face-1 .pip:nth-child(1) { display: block; grid-column: 2; grid-row: 2; }
        
        .face-2 .pip:nth-child(1) { display: block; grid-column: 3; grid-row: 1; }
        .face-2 .pip:nth-child(2) { display: block; grid-column: 1; grid-row: 3; }

        .face-3 .pip:nth-child(1) { display: block; grid-column: 3; grid-row: 1; }
        .face-3 .pip:nth-child(2) { display: block; grid-column: 2; grid-row: 2; }
        .face-3 .pip:nth-child(3) { display: block; grid-column: 1; grid-row: 3; }

        .face-4 .pip:nth-child(1) { display: block; grid-column: 1; grid-row: 1; }
        .face-4 .pip:nth-child(2) { display: block; grid-column: 3; grid-row: 1; }
        .face-4 .pip:nth-child(3) { display: block; grid-column: 1; grid-row: 3; }
        .face-4 .pip:nth-child(4) { display: block; grid-column: 3; grid-row: 3; }

        .face-5 .pip:nth-child(1) { display: block; grid-column: 1; grid-row: 1; }
        .face-5 .pip:nth-child(2) { display: block; grid-column: 3; grid-row: 1; }
        .face-5 .pip:nth-child(3) { display: block; grid-column: 2; grid-row: 2; }
        .face-5 .pip:nth-child(4) { display: block; grid-column: 1; grid-row: 3; }
        .face-5 .pip:nth-child(5) { display: block; grid-column: 3; grid-row: 3; }

        .face-6 .pip:nth-child(1) { display: block; grid-column: 1; grid-row: 1; }
        .face-6 .pip:nth-child(2) { display: block; grid-column: 1; grid-row: 2; }
        .face-6 .pip:nth-child(3) { display: block; grid-column: 1; grid-row: 3; }
        .face-6 .pip:nth-child(4) { display: block; grid-column: 3; grid-row: 1; }
        .face-6 .pip:nth-child(5) { display: block; grid-column: 3; grid-row: 2; }
        .face-6 .pip:nth-child(6) { display: block; grid-column: 3; grid-row: 3; }

        #total {
            font-size: 1.8em;
            font-weight: bold;
            color: #2c3e50;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        
        #total.visible { opacity: 1; }
    </style>
</head>
<body>

    <h1>Бросок кубиков D6</h1>

    <div class="controls">
        <div class="control-group">
            <label for="dice-count">Количество:</label>
            <input type="number" id="dice-count" min="1" max="20" value="3">
        </div>
        <div class="control-group">
            <label for="dice-color">Цвет кубиков:</label>
            <input type="color" id="dice-color" value="#ffffff">
        </div>
        <button id="roll-btn">Бросить</button>
    </div>

    <div id="dice-container"></div>
    <div id="total">Сумма: 0</div>

    <script>
        const container = document.getElementById('dice-container');
        const totalEl = document.getElementById('total');
        const rollBtn = document.getElementById('roll-btn');
        const countInput = document.getElementById('dice-count');
        const colorInput = document.getElementById('dice-color');

        // Initialize color
        updateColors();
        colorInput.addEventListener('input', updateColors);

        function updateColors() {
            const color = colorInput.value;
            document.documentElement.style.setProperty('--dice-color', color);
            
            // Calculate brightness to determine pip color
            const r = parseInt(color.substr(1,2), 16);
            const g = parseInt(color.substr(3,2), 16);
            const b = parseInt(color.substr(5,2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            document.documentElement.style.setProperty('--pip-color', brightness > 128 ? '#111111' : '#f8f9fa');
        }

        rollBtn.addEventListener('click', () => {
            const count = Math.max(1, Math.min(20, parseInt(countInput.value) || 1));
            countInput.value = count;
            
            rollBtn.disabled = true;
            totalEl.classList.remove('visible');
            container.innerHTML = '';
            
            let totalSum = 0;
            const animationDuration = 1500; // ms

            for (let i = 0; i < count; i++) {
                const val = Math.floor(Math.random() * 6) + 1;
                totalSum += val;

                const wrapper = document.createElement('div');
                wrapper.className = 'dice-wrapper';
                
                const dice = document.createElement('div');
                dice.className = 'dice rolling';
                
                // Build 6 faces
                for (let f = 1; f <= 6; f++) {
                    const face = document.createElement('div');
                    face.className = `face face-${f}`;
                    for (let p = 0; p < f; p++) {
                        const pip = document.createElement('div');
                        pip.className = 'pip';
                        face.appendChild(pip);
                    }
                    dice.appendChild(face);
                }
                
                wrapper.appendChild(dice);
                container.appendChild(wrapper);

                // Stagger the resolution of each dice
                setTimeout(() => {
                    dice.classList.remove('rolling');
                    
                    // Target rotations for each face
                    let targetX = 0, targetY = 0;
                    if (val === 1) { targetX = 0; targetY = 0; }
                    else if (val === 2) { targetX = 0; targetY = 180; }
                    else if (val === 3) { targetX = 0; targetY = 90; }
                    else if (val === 4) { targetX = 0; targetY = -90; }
                    else if (val === 5) { targetX = -90; targetY = 0; }
                    else if (val === 6) { targetX = 90; targetY = 0; }

                    // Add random full spins for realistic rolling effect
                    const spinsX = (Math.floor(Math.random() * 2) + 2) * 360; // 2 or 3 full spins
                    const spinsY = (Math.floor(Math.random() * 2) + 2) * 360;
                    const dirX = Math.random() > 0.5 ? 1 : -1;
                    const dirY = Math.random() > 0.5 ? 1 : -1;

                    const finalX = targetX + (spinsX * dirX);
                    const finalY = targetY + (spinsY * dirY);

                    dice.style.transform = `rotateX(${finalX}deg) rotateY(${finalY}deg)`;
                }, 100 + (i * 150)); // Stagger start of deceleration
            }

            // Show total after all animations finish
            setTimeout(() => {
                totalEl.textContent = `Сумма: ${totalSum}`;
                totalEl.classList.add('visible');
                rollBtn.disabled = false;
            }, animationDuration + (count * 150));
        });
    </script>
</body>
</html>
